# SAFE-T1803: Database Dump Detection Rule
# This rule detects bulk database exfiltration patterns initiated through MCP-exposed
# SQL or backup/export tools (full-table SELECTs, dump utilities, or unusually large
# result sets against high-value tables).
# Note: This is an example rule. Tune thresholds and tool/account names to your environment.

title: MCP Database Dump via SQL or Backup Tool Detection
id: 9d4e1e5b-8825-4cb0-9a7c-6d8322c5d21f
status: experimental
description: Detects suspicious database dump activity initiated through MCP-exposed SQL or backup/export tools, including full-table SELECT queries, logical backup/dump commands, and unusually large result sets against high-value tables.
author: Pratikshya Regmi
date: 2025-11-29
modified: 2026-04-14
references:
  - https://github.com/safe-mcp/techniques/SAFE-T1803
  - https://attack.mitre.org/techniques/T1213/006/
  - https://attack.mitre.org/techniques/T1074/
logsource:
  product: mcp
  service: tool_invocation
  category: application
detection:
  # MCP tool calls invoking a database-capable tool.
  selection_db_tool:
    tool.name:
      - 'sql.query'
      - 'sql.execute'
      - 'db.query'
      - 'db.execute'
      - 'cloud-sql.query'
      - 'cloud-sql.execute'
      - 'warehouse.query'
      - 'warehouse.export'

  # SQL or argument patterns commonly associated with bulk database dumps or exports.
  selection_dump_pattern:
    tool.args.sql|contains:
      - 'SELECT * FROM'
      - 'pg_dump'
      - 'mysqldump'
      - 'BACKUP DATABASE'
      - 'EXPORT DATA'
      - 'COPY '
      - ' TO STDOUT'
      - ' INTO OUTFILE'

  # Optional: high row-count or payload size returned to the LLM host.
  selection_large_result:
    tool.result.row_count|gte: 100000

  selection_large_payload:
    tool.result.size_bytes|gte: 104857600   # 100 MB

  # Optional: database-side corroboration for an MCP-linked service account.
  selection_db_corroboration:
    db.log.user|contains: 'mcp'
    db.log.query|contains:
      - 'SELECT * FROM'
      - 'pg_dump'
      - 'mysqldump'
      - 'BACKUP DATABASE'
    db.log.estimated_rows|gte: 100000

  condition: selection_db_tool and (selection_dump_pattern or selection_large_result or selection_large_payload or selection_db_corroboration)

fields:
  - tool.name
  - tool.args.sql
  - tool.result.row_count
  - tool.result.size_bytes
  - tool.result.destination
  - session.id
  - user.id
  - db.log.user
  - db.log.query
  - db.log.estimated_rows

falsepositives:
  - Approved analytics or reporting jobs that legitimately scan large tables
  - Scheduled DBA-initiated backups or warehouse exports
  - Data engineering pipelines that intentionally use COPY / EXPORT for ETL
  - Load-testing or performance benchmarking against synthetic datasets

level: high

tags:
  - attack.collection
  - attack.exfiltration
  - attack.t1213
  - attack.t1213.006
  - attack.t1074
  - attack.t1041
  - attack.t1567
  - safe.t1803
  - mcp.security
  - mcp.sql
